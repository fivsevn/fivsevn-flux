name: Sync live WordPress posts

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */5 * * *'

permissions:
  contents: write

concurrency:
  group: flux-live-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Sync recent WordPress posts
        run: python scripts/sync-from-live.py --limit 73

      - name: Localize media
        run: python scripts/localize-media.py

      - name: Build index
        run: python scripts/build.py

      - name: Commit synced flux packages and index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: sync live wordpress posts and build index
          file_pattern: |
            flux/**
            index.html
