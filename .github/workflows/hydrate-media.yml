name: Hydrate media

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flux-media-hydrate
  cancel-in-progress: false

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Download remote images into per-post assets folders
        run: python scripts/localize-media.py
      - name: Rebuild index
        run: python scripts/build.py
      - name: Commit localized media
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: hydrate flux media
          file_pattern: flux/** index.html
