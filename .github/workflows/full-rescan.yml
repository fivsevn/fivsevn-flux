name: Full rescan WordPress posts

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flux-full-rescan
  cancel-in-progress: false

jobs:
  full-rescan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Full rescan WordPress posts
        run: python scripts/sync-from-live.py --limit 9999

      - name: Localize media
        run: python scripts/localize-media.py

      - name: Build index
        run: python scripts/build.py

      - name: Commit full rescan result and index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: full rescan wordpress posts and build index
          file_pattern: |
            flux/**
            index.html
