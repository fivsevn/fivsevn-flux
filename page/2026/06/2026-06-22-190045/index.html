<script>
function goBackHome(event) {
  try {
    const ref = document.referrer ? new URL(document.referrer) : null;
    const sameSite = ref && ref.origin === window.location.origin;
    if (sameSite && window.history.length > 1) {
      event.preventDefault();
      window.history.back();
      return false;
    }
  } catch (e) {}
  return true;
}
