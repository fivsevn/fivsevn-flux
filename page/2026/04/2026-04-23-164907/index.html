 <div class="entry-body"><p>阿内特</p>
<blockquote>
<p>这些模式反映出一些学者对流体智力和晶体智力的区分。流体智力（fluid intelligence）是指涉及分析信息的速度、加工信息的速度，以及对信息做出反应的速度等方面的心理能力，这是操作分测验旨在评估的能力。智商测验表明，这种智力在成年初显期达到顶峰，然后开始下降。而晶体智力（crystallized intelligence）是指基于经验积累的知识以及增强的判断力。常识、理解和词汇等分测验评估这种智力，这些分测验的绝对分数往往会在20多岁和30多岁及以后提高。</p>
</blockquote>
