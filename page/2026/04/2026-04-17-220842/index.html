 <div class="entry-body"><p>阿内特</p>
<blockquote>
<p>皮亚杰的认知发展理论一样，信息加工取向也受到了批评。批评者指出，信息加工理论家和研究者犯了还原主义（reductionism） 错误，即把一个现象分解为几个单独的部分，以至于现象作为一个整体的意义和连贯性丧失了。从这个角度来看，信息加工学者视为优势的地方—专注于认知过程的各个组成部分—实际上是一个弱点。用一位批评者的话来说，信息加工取向导致学者们得出一个错误的结论：“行为表现只是一系列特定过程的序列执行。”（原书强调了“只是”）</p>
</blockquote>
<p>提供思路。</p>
