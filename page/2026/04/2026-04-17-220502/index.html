 <div class="entry-body"><p>阿内特</p>
<blockquote>
<p>自动化与速度和工作记忆的容量密切相关。认知任务的自动化水平越高，完成任务的速度就越快。同样，完成一项任务的自动化水平越高，它占用的工作记忆的容量就越小，从而为其他任务留出了更多空间。例如，你可以一边看电视一边阅读杂志，但如果让你一边看电视一边填写纳税申报表，你可能会觉得很难。这是因为对你来说，阅读纳税申报表上的语言（满是仅在纳税申报表上能看到的术语）没有阅读杂志上的语言的自动化水平高。</p>
</blockquote>

      window.history.back();

  } catch (e) {}
  return true;
}
