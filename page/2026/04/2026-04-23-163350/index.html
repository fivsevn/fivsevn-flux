<p>与假想观众一样，个人神话会随着年龄的增长而减少，但对于我们大多数人来说，个人神话永远不会完全消失。即便是大多数成年人也喜欢认为，他们的个人经历和个人命运即使并非独一无二，也有一些特别之处。但是个人神话在青少年期往往比在之后的年龄段更强，因为随着年龄的增长，我们的经历以及与他人的交谈使我们意识到我们的思想和感觉并不像我们想象得那么特别。</p>
