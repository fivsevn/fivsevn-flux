 <h2 class="entry-title"><a href="/page/2026/05/2026-05-17-002345/">17 May, 2026 00:23</a></h2>
 <div class="entry-body"><p>印尼etc.</p>
<blockquote>
<p>许多乘客之所以往返基萨尔岛，是为了递交工程提案，例如一位乡长的弟弟不久前刚利用一堆回收瓶子帮县长办公室架设了一株圣诞树，现在又得为明年复活节的装饰工程交一份提案出去。二十年前，我很少听印尼人提起“递交提案”这种事，现在不但常听到非政府组织提起它，连牧师、学生、农民、老师、乡村妇女团体、警察和其他人也经常挂在嘴上。如今每个印尼人似乎都在绞尽脑汁想提案，以便从经费充裕的地方政府身上挤出一点（有时金额还不小）油水来。</p>
</blockquote>
