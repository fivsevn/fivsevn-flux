 <div class="entry-body"><p>印尼etc.</p>
<blockquote>
<p>亚齐省移民蒙受迫害，只是地方对中央政府表达不满的一个极端例子。话说回来，有些地方的移民纵使能与当地邻居和睦共处，他们还是习惯讲家乡话，种植自己在家乡种的作物，成立类似爪哇或巴厘岛加麦兰乐团的音乐团体。这种情况比较像文化移植而非越区移民，难以形成同化力量。</p>
<p>在苏哈托的建国大业中，内部移民是个罕见的失败政策，比较成功的案例是推广电视（这位农家出身的领导者会干这种事，倒是颇出人意料）。</p>
</blockquote>
<p>现在抖音之类的社交媒体也挺促进同化的。</p>
