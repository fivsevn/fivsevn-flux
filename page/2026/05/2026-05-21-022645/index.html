 <div class="entry-body"><p>印尼etc.</p>
<blockquote>
<p>印尼人的日常宗教礼俗比欧洲人来得多，许多民众习惯在身上别着代表个人信仰的徽章、在头上包着头巾或戴着小帽、在颈上挂着十字架或佛陀护身符，清真寺、教堂、佛殿也会举办大量集体祷告祈愿活动，因此我在印尼上教堂的次数比过去多，也不时心怀诚敬地坐在安静的清真寺角落里聆听布道，这样既符合印尼人的期待，也是融入当地社会的一种方式。</p>
