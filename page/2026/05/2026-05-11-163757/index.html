 <div class="entry-body"><p>一旦有高低差存在，水就会产生流向。
所谓资本压力，并不一定总是资本主动命令你做什么。它更像一种高低差：只要资源、机会、话语权、市场回报之间存在落差，人和语言就会自然向更高势能的一侧流动。</p>
<p>就像你身边出现一个比你优秀很多的人，他不一定真的在压迫你，但他的存在本身就可能让你焦虑，因为差距已经形成了比较和牵引。</p>
<p>资本压力也许可以理解成一种“势能差”：资源越集中，吸引力越强；机会越不均匀，流向越明显。很多时候并不是谁在明面上逼迫你，而是现实结构已经标出了方向。</p>
