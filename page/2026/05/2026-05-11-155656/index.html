 <div class="entry-body"><p>陌生国度里，对方没有理解你的义务，而你有被理解的需求。这本身就是不对等。所以最后比的不是对错之类，是谁更着急；谁更急，谁就更主动、学得更快。</p>
<p>换句话说，谁的需求更高，谁就更容易主动适应；而需求更高的一方，也意味着通常会承担更多的沟通成本。也许人类的大部分学习行为，往往由需求、压力和收益驱动（或者说如果我们把“需求”定义得足够广的话，几乎可以解释大部分持续学习行为）。</p>
<p>不过这些仅限于行为层面的观察，并不是绝对的规律。</p>
</div>
